## AI-Assisted

## Self-consumer wrapper. Calls the Claude Code Review reusable
## defined in this same repo via local-path './...' rather than
## cross-repo '@master' - so a PR that modifies the reusable
## exercises its own changes during the PR's CI run (dogfooding).
##
## Docs live in the reusable:
## .github/workflows/reusable-claude-code-review.yml

name: Claude Code Review

on:
  pull_request:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read

jobs:
  review:
    uses: ./.github/workflows/reusable-claude-code-review.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
