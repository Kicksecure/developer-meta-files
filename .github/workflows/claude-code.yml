## AI-Assisted

## Self-consumer wrapper. Calls the Claude Code Review reusable
## defined in this same repo via local-path './...' rather than
## cross-repo '@master' - so a PR that modifies the reusable
## exercises its own changes during the PR's CI run (dogfooding).
##
## Docs live in the reusable:
## .github/workflows/reusable-claude-code-review.yml

name: Claude Code Review

on:
  pull_request:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

## issue_comment / pull_request_review_comment fire with
## github.ref = default branch (NOT the PR head ref). Plain
## ${{ github.ref }} would queue unrelated PRs' comment-triggered
## runs into the same group. The PR/issue-number fallback chain
## isolates per-PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    uses: ./.github/workflows/reusable-claude-code-review.yml
    ## Explicit secret forwarding (NOT 'secrets: inherit'). With
    ## inherit, every caller-side secret would flow into the
    ## reusable; the explicit map caps the reusable's secrets
    ## context to exactly ANTHROPIC_API_KEY.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
