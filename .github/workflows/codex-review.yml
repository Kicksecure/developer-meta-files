## AI-Assisted

## Self-consumer wrapper. Calls the Codex Review reusable defined
## in this same repo via local-path './...' rather than cross-repo
## '@master' - so a PR that modifies the reusable exercises its
## own changes during the PR's CI run (dogfooding).
##
## Docs live in the reusable:
## .github/workflows/reusable-codex-review.yml

name: OpenAI Codex Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_ref:
        description: |
          Ref of the fork PR to review.
          Use `refs/pull/<N>/merge` (most accurate; mirrors what
          would land), or `refs/pull/<N>/head` for the PR head.
          A plain branch name in the upstream repo also works for
          non-fork PRs.
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    uses: ./.github/workflows/reusable-codex-review.yml
    with:
      pr-ref: ${{ inputs.pr_ref || '' }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    permissions:
      contents: read
      pull-requests: write
