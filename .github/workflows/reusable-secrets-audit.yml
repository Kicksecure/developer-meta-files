## AI-Assisted

## Reusable workflow: secret-isolation regression guard.
##
## Caller forwards via 'secrets: inherit' so this audit sees the
## same secrets context the caller has. Booleans below are
## resolved at expression-evaluation time, so secret values
## themselves never land in env or step output.
##
## No 'concurrency:' block. 'github.workflow' in a reusable
## resolves to the *original caller's* workflow name, so adding a
## concurrency group here would deadlock with the parent reusable's
## group when both run as siblings under the same caller. The
## parent caller's concurrency group already covers this audit run.

name: Secrets surface audit (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  audit:
    name: Secrets surface audit
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    env:
      ANTHROPIC_PRESENT: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      OPENAI_PRESENT: ${{ secrets.OPENAI_API_KEY != '' }}
      COVERITY_TOKEN_PRESENT: ${{ secrets.COVERITY_SCAN_TOKEN != '' }}
      COVERITY_EMAIL_PRESENT: ${{ secrets.COVERITY_SCAN_EMAIL != '' }}
    steps:
      ## When the original caller is dev-meta-files itself (dogfooding
      ## on a PR that modifies the audit script), check out at the
      ## caller's own commit so PR-modified scripts are exercised.
      ## For cross-repo callers, github.sha is the consumer's commit
      ## - useless for dev-meta-files - so fall back to master.
      - name: Checkout developer-meta-files (audit script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: org-ai-assisted/developer-meta-files
          ref: ${{ github.repository == 'org-ai-assisted/developer-meta-files' && github.sha || 'master' }}
          path: .github/dmf
          persist-credentials: false
      - name: Probe secrets surface
        run: bash .github/dmf/ci/secrets-audit.sh
