## AI-Assisted

## Manual-trigger live-API workflow. Three steps against the real
## GitHub REST API:
##   1. unauth probe (ci/live-probe-unauth.sh): no token, smoke-tests
##      the read paths against the public 'octokit' org.
##   2. dm-github-policy --audit (auth): GET-only inspection of
##      org-ai-assisted's current settings using GHORG_AUDIT_TOKEN.
##   3. dm-github-policy --dry-run (auth): prints the PATCH/PUT/POST
##      calls it WOULD make (prefixed "DRY-RUN:") but never mutates.
##
## All three are GET-only; safe with a read-only PAT. If a step
## fails, the next step does not run (default GitHub Actions step
## ordering); the unauth probe is gated by continue-on-error since
## the unauth rate-limit can legitimately exhaust on a hot egress IP.
##
## To enable:
##   1. Mint a fine-grained PAT under the user that owns
##      org-ai-assisted access (read-only on Repository:
##      Administration/Contents/Metadata/Webhooks and Organization:
##      Administration/Members/Webhooks).
##   2. Settings -> Secrets and variables -> Actions -> New repository
##      secret named GHORG_AUDIT_TOKEN.
##   3. Actions tab -> "github-org tools (live)" workflow -> Run
##      workflow.
##
## To revoke: delete the secret in the same UI, or revoke the PAT in
## the user's Developer settings.

name: github-org tools (live)

on:
  workflow_dispatch:

## org-ai-assisted-only gate. The literal "org-ai-assisted/developer-meta-files"
## in the job-level `if:` below pins this workflow to our CI home and
## prevents any other repo (including the Kicksecure upstream mirror)
## from running this workflow's secret-dependent paths - the secret(s)
## referenced below (Coverity token / GHORG_AUDIT_TOKEN, an
## org-ai-assisted-scoped read-only PAT) are only set on
## org-ai-assisted/developer-meta-files. Another repo would either see
## those secrets as empty and fail mid-flight, or - worse - run the
## heavy ops with its own arbitrary-named secret.
##
## The canonical owner/repo is inlined in the `if:` rather than
## hoisted to a workflow-level `env:` constant because GitHub Actions
## does not expose the `env` context in job-level `if:` expressions
## (only `github`, `inputs`, `needs`, and `vars` are available there).

## Read-only on the checked-out source.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    name: live-API audit + dry-run + unauth probe
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: debian:trixie

    ## Pin to org-ai-assisted so no other repo's workflow can use the
    ## secret (GitHub also blocks this by default for forked PRs, but
    ## the explicit guard documents intent).
    if: ${{ github.repository == 'org-ai-assisted/developer-meta-files' }}

    steps:
      - name: Checkout developer-meta-files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install genmkfile + helper-scripts + self
        uses: ./.github/actions/install-deps
        with:
          apt-packages: ca-certificates curl jq git sudo build-essential dctrl-tools python3 safe-rm
          install-self: 'true'

      - name: Verify token secret is set
        env:
          token_present: ${{ secrets.GHORG_AUDIT_TOKEN != '' }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          if [ "${token_present}" != 'true' ]; then
             printf '%s\n' \
                'error: GHORG_AUDIT_TOKEN secret is not set on this repo.' \
                '       Add it under Settings -> Secrets and variables -> Actions.' >&2
             exit 1
          fi
          printf '%s\n' 'GHORG_AUDIT_TOKEN secret detected.'

      - name: Live unauth smoke probe
        ## continue-on-error: the unauth rate-limit can be exhausted
        ## on a hot egress IP and that's not a real failure of the
        ## tools.
        continue-on-error: true
        run: ./ci/live-probe-unauth.sh

      - name: Run dm-github-policy --audit (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GHORG_AUDIT_TOKEN }}
        run: dm-github-policy --audit

      - name: Run dm-github-policy --dry-run (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GHORG_AUDIT_TOKEN }}
        run: dm-github-policy --dry-run

      - name: Emit step summary
        if: always()
        ## Minimal panel surfacing pass/fail. The unauth probe has
        ## continue-on-error so a job-status=success here only means
        ## the audit + dry-run steps succeeded - the probe outcome
        ## is still in its own step log. Template values routed
        ## through env: per #87 to avoid CodeQL flagging.
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          ./ci/step-summary-emit.sh \
            --tool 'github-org tools (live)' \
            --column-header field \
            --row "outcome=${JOB_STATUS}" \
            --row "modes=unauth-probe + audit + dry-run"
