## AI-Assisted

## Manual-trigger entry point for reusable-secrets-audit.yml.
## Run from the Actions tab: 'Secrets surface audit' > 'Run
## workflow'. Use as a sanity check after changing any reusable's
## 'workflow_call.secrets' schema or any consumer's 'secrets:'
## map.
##
## 'secrets: inherit' here forwards the entire repo-level + org-
## level secret set into the audit reusable, which prints presence
## flags. The audit boolean is resolved at expression-evaluation
## time, so secret values themselves never land in env or step
## output.

name: Secrets surface audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-secrets-audit.yml@master
    secrets: inherit
