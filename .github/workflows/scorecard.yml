## AI-Assisted

## Self-consumer wrapper. Calls the Scorecard reusable defined in
## this same repo via local-path './...' rather than the cross-repo
## '@master' form used by other consumers - so a PR modifying the
## reusable exercises its own changes during the PR's CI run
## (dogfooding) instead of running the master version.
##
## Docs (caller responsibilities, inputs, secrets) live in the
## reusable: .github/workflows/reusable-scorecard.yml

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    ## Cron slot owned by this repo. Org allocation:
    ##   derivative-maker:     '0 4 * * 0'
    ##   helper-scripts:       '30 4 * * 0'
    ##   kloak:                '0 5 * * 0'
    ##   security-misc:        '30 5 * * 0'
    ##   developer-meta-files: '0 6 * * 0'
    - cron: '0 6 * * 0'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: ./.github/workflows/reusable-scorecard.yml
    permissions:
      security-events: write
      contents: read
      actions: read
