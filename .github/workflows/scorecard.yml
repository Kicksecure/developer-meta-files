## Reusable workflow: OpenSSF Scorecard.
##
## Runs the Scorecard tool against the calling repository, uploads the
## SARIF result as an artifact (14-day retention) and to GitHub
## code-scanning. Trust footprint: OpenSSF (Linux Foundation), same as
## github/codeql-action.
##
## Caller responsibilities:
##   - Define the trigger (branch_protection_rule + schedule). Schedule
##     cannot live in a reusable workflow per GitHub Actions; pick a
##     cron slot that does not collide with other repos in the org.
##   - Grant the job-level permissions block listed below (security-
##     events: write, contents: read, actions: read).
##
## Caller example:
##
##   name: Scorecard
##   on:
##     branch_protection_rule:
##     schedule:
##       - cron: '0 4 * * 0'
##   permissions:
##     contents: read
##   jobs:
##     scorecard:
##       uses: Kicksecure/developer-meta-files/.github/workflows/scorecard.yml@master
##       permissions:
##         security-events: write
##         contents: read
##         actions: read

name: Scorecard (reusable)

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    ## Fork-PR guard: a no-op unless the caller routes pull_request
    ## events into us, in which case it blocks PRs from forks (those
    ## need maintainer review and a manual re-run from a trusted ref).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    timeout-minutes: 10

    permissions:
      security-events: write
      contents: read
      actions: read
      ## Intentionally NOT 'id-token: write'. That is only needed for
      ## publish_results: true; keep us off the OSSF public transparency
      ## log unless the project opts in (one-way commitment).

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 14

      - name: Upload to GitHub code scanning
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: results.sarif
