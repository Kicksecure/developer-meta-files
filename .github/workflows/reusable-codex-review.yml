## AI-Assisted

## Reusable workflow: OpenAI Codex code review.
##
## ## Status: DISABLED (org-wide kill-switch)
##
## The Codex review workflow path is currently disabled via the
## job-level 'if: false' kill-switch in the active 'review:' job
## below. Every consumer wrapper calls this reusable via '@master',
## so flipping the switch here propagates to every caller
## immediately - no consumer wrapper edits needed to disable, and
## no edits needed to re-enable.
##
## ## Re-enabling
##
## The full implementation (PR / comment / workflow_dispatch
## triggers, fork-PR safety, PR-head resolve, openai/codex-action
## invocation) is preserved as commented YAML at the bottom of
## this file under '## ARCHIVED IMPLEMENTATION ##'. Inputs schema,
## permissions, and concurrency block above stay identical between
## disabled and enabled states; only the 'review:' job body needs
## to swap.
##
## To re-enable:
##   1. Delete the active 'review:' job below (the one with
##      'if: false').
##   2. Uncomment the archived 'review:' block at the bottom
##      (remove the leading '## ' on each line of the block
##      between the BEGIN/END markers).
##   3. Update the file 'name:' from "DISABLED" to drop the suffix.
##   4. Update this header doc status accordingly.
##
## ## What this does NOT disable
##
## - OpenAI's hosted Codex Cloud GitHub App
##   (chatgpt-codex-connector[bot]) which listens natively for
##   '@codex review' comments and PR-open events. That App is
##   configured at https://chatgpt.com/codex/cloud/settings/general
##   and is independent of this workflow.
## - The OPENAI_API_KEY org secret. Leave it in place - it is
##   simply unreferenced while this stub is in effect.
##
## ## Trust footprint (when enabled)
##
## openai/codex-action - SHA-pinned, calls the OpenAI API with the
## caller's OPENAI_API_KEY. Posts review comments via the runner's
## GITHUB_TOKEN scoped to the permissions block on the calling job.
##
## ## Inputs (preserved for caller compatibility)
##
## - allow-bot-users   (optional)  Comma-separated bot usernames
##                                 to bypass the action's actor-
##                                 write-access gate. Doubles as
##                                 the @codex-review comment-
##                                 trigger roster (humans in this
##                                 list are also allowed to invoke
##                                 via comment).
##                                 Default: org canonical bot list.
## - pr-ref            (optional)  Ref to checkout (workflow_dispatch
##                                 fork-PR review path). Use
##                                 'refs/pull/<N>/merge' (most
##                                 accurate) or 'refs/pull/<N>/head'.
##                                 Default: "" (use github.ref).
## - sandbox           (optional)  Codex sandbox mode. Default
##                                 'read-only' - the action runs
##                                 review-only, no workspace
##                                 mutation.
## - prompt            (optional)  Instruction passed to Codex.
##                                 Default: a generic
##                                 security/correctness/best-practices
##                                 review prompt.
## - timeout-minutes   (optional)  Job timeout. Default 30.
##
## Defaults are kept at their enabled-state values so that a
## re-enable does not silently change behavior.

name: OpenAI Codex Review (reusable, DISABLED)

on:
  workflow_call:
    inputs:
      allow-bot-users:
        required: false
        type: string
        default: "adrelanos,ArrayBolt3,assisted-by-ai"
      pr-ref:
        required: false
        type: string
        default: ""
      sandbox:
        required: false
        type: string
        default: "read-only"
      prompt:
        required: false
        type: string
        default: "Review the code changes in this PR for security, correctness, and best practices."
      timeout-minutes:
        required: false
        type: number
        default: 30
    ## When re-enabling, consider tightening to an explicit
    ## 'secrets:' schema declaration mirroring the Claude reusable's
    ## hardening (force callers to pass OPENAI_API_KEY explicitly
    ## rather than via 'secrets: inherit'). Currently kept loose
    ## since the active stub does not read any secrets.

permissions:
  contents: read

## Concurrency key includes the PR/issue number so different PRs
## don't share a group on issue_comment events (which run on the
## default branch ref, not the PR head ref). Kept identical to the
## archived implementation so a future re-enable does not change
## concurrency semantics mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr-ref || github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  ## ACTIVE: kill-switch stub. Every consumer wrapper calls this
  ## reusable via '@master', so this single 'if: false' disables
  ## Codex review across every caller in the org. The job is
  ## skipped (no runner allocated, zero CI minutes); the
  ## corresponding check appears as 'skipped' in the consumer's
  ## PR check list.
  review:
    name: OpenAI Codex Review (disabled)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: ":"

