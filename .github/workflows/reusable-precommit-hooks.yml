## AI-Assisted

## Reusable workflow: file-hygiene gate using the upstream
## pre-commit-hooks binaries (check-added-large-files, check-yaml,
## check-json, end-of-file-fixer, trailing-whitespace-fixer, ...).
## Bare-binary invocations -- no pre-commit framework dependency,
## per the org preference to keep tooling auditable.
##
## Companion to reusable-pre-push-static.yml. Different domain:
## pre-push-static enforces bash-style-guide rules; this enforces
## generic file hygiene (BOM, line endings, schema validity of
## yaml/json/toml/xml, leaked credentials, large files, executable
## bits, ...).
##
## Runs in a Debian trixie container because:
##   * pre-commit-hooks is not in Debian bookworm (stable) apt.
##   * pre-commit-hooks is not in Ubuntu noble (24.04 = current
##     ubuntu-latest in GH Actions) apt either.
##   * pre-commit-hooks IS in Debian trixie apt (5.0.0+dfsg-5).
## apt-only by org preference; no pip fallback.
##
## No 'concurrency:' block here per the secrets-audit precedent
## (github.workflow inside a reusable resolves to the original
## caller, so a group declared here would deadlock).

name: pre-commit-hooks gate (reusable)

on:
  workflow_call:
    inputs:
      base-ref:
        description: 'Git ref to diff against. Default: PR base for pull_request, origin/master otherwise.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  gate:
    name: pre-commit-hooks gate
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      BASE_REF: >-
        ${{
          inputs.base-ref != '' && inputs.base-ref
          || (github.base_ref != '' && format('origin/{0}', github.base_ref) || 'origin/master')
        }}
    steps:
      - name: Install dependencies (apt only)
        ## R-100: 4 lines, no control flow -- inline is acceptable.
        ## file: required by ci/precommit-hooks-gate.sh's MIME-type
        ## fallback when classifying extension-less files as text.
        run: |
          apt-get update --quiet
          apt-get install --yes --no-install-recommends \
            ca-certificates file git pre-commit-hooks
          git config --global --add safe.directory '*'

      - name: Checkout caller repo (full history for git diff)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout developer-meta-files (gate script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: org-ai-assisted/developer-meta-files
          ref: ${{ github.repository == 'org-ai-assisted/developer-meta-files' && github.sha || 'master' }}
          path: .github/dmf
          persist-credentials: false

      - name: Run pre-commit-hooks gate
        run: ./.github/dmf/ci/precommit-hooks-gate.sh "${BASE_REF}"
