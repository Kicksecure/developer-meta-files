## AI-Assisted

## Reusable workflow: Coverity Scan static analysis.
##
## Replaces the third-party 'vapier/coverity-scan-action' approach
## with an inline curl + tar + cov-build flow shared across the org's
## consumers. No third-party Action's permissions footprint, no
## Marketplace dependency, single auditable script set in
## developer-meta-files/ci/.
##
## ## Trust footprint
##
## scan.coverity.com (Black Duck / Synopsys) - the cov-analysis
## tarball download is gated on a valid project token, md5-verified
## against the same endpoint, and optionally sha256-pinned via a
## .coverity-tool-sha256.expected file in the consumer repo root.
## See ci/coverity-download.sh for the verification logic.
##
## ## Secret isolation
##
## Strict 'workflow_call.secrets' schema below requires the caller
## to forward exactly COVERITY_SCAN_TOKEN and COVERITY_SCAN_EMAIL.
## Callers must use an explicit 'secrets:' map - 'secrets: inherit'
## bypasses the schema (it forwards every caller-side secret
## regardless). Run .github/workflows/secrets-audit.yml manually to
## verify the secrets surface.
##
## ## Caller responsibilities
##
## - Define the trigger schedule. Coverity Scan rate-limits
##   submissions (daily build limit), so weekly cron is the
##   typical choice. Schedule cannot live in workflow_call per
##   G-A-002.
## - Hardcode the owner in 'jobs.<id>.uses:' (G-A-001).
## - Forward via explicit 'secrets:' map (see Caller example). Not
##   'inherit'.
## - Set repo variable 'COVERITY_PROJECT' to the project name as it
##   appears in the scan.coverity.com URL (or pass project-name
##   input to override).
##
## ## Inputs
##
## - apt-packages    (optional)  Space-separated apt packages to
##                               install before the build step.
##                               Default empty.
## - build-command   (optional)  Bash invocation that runs cov-build
##                               under the runner's cwd (= consumer
##                               repo root). cov-build is reachable
##                               at ./cov-analysis/bin/cov-build
##                               after the download step. If empty,
##                               falls back to the Python-only
##                               default in
##                               developer-meta-files/ci/coverity-
##                               build-python.sh.
## - project-name    (optional)  Coverity project name. Falls back
##                               to vars.COVERITY_PROJECT, then to
##                               the GitHub repo's basename.
## - timeout-minutes (optional)  Job timeout. Default 30.
## - canonical-repos (optional)  Comma-separated 'owner/repo' list
##                               where this workflow is allowed to
##                               run on push/schedule. Forks must
##                               use workflow_dispatch. Defaults to
##                               only the canonical repo (the
##                               'github.repository' the workflow is
##                               called from); pass an explicit list
##                               like
##                               'Kicksecure/foo,org-ai-assisted/foo'
##                               to allow both upstreams.
##
## ## Secrets
##
## Forwarded explicitly by the caller (see Caller example):
##
## - COVERITY_SCAN_TOKEN  (required)  Coverity project token.
##                                    MUST be set as a repository
##                                    secret per consumer - tokens
##                                    are scoped per project on
##                                    scan.coverity.com, and our
##                                    consumers (helper-scripts,
##                                    kloak, security-misc) are
##                                    distinct Coverity projects
##                                    with distinct tokens. Cannot
##                                    be set org-wide.
## - COVERITY_SCAN_EMAIL  (required)  Notification email registered
##                                    on the Coverity project. CAN
##                                    be set org-wide if every
##                                    project shares one notification
##                                    address.
##
## ## Caller example - Python-only repo
##
##   name: Coverity
##   on:
##     schedule:
##       - cron: '0 6 * * 0'
##     workflow_dispatch:
##   permissions:
##     contents: read
##   jobs:
##     coverity:
##       uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
##       with:
##         project-name: helper-scripts
##       secrets:
##         COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
##         COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
##       permissions:
##         contents: read
##
## ## Caller example - C/C++ repo
##
##   jobs:
##     coverity:
##       uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
##       with:
##         apt-packages: 'libevdev-dev libinput-dev libwayland-dev libxkbcommon-dev pkg-config'
##         build-command: ./cov-analysis/bin/cov-build --dir cov-int make
##         project-name: kloak
##       secrets:
##         COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
##         COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
##       permissions:
##         contents: read

name: Coverity Scan (reusable)

on:
  workflow_call:
    inputs:
      apt-packages:
        required: false
        type: string
        default: ""
      build-command:
        required: false
        type: string
        default: ""
      project-name:
        required: false
        type: string
        default: ""
      timeout-minutes:
        required: false
        type: number
        default: 30
      canonical-repos:
        required: false
        type: string
        default: ""
    secrets:
      COVERITY_SCAN_TOKEN:
        required: true
      COVERITY_SCAN_EMAIL:
        required: true

permissions:
  contents: read

## Coverity Scan has a 1-build/day rate limit on the free public
## service. cancel-in-progress=false because cancelling mid-flight
## wastes the daily slot; parallel submissions queue server-side
## anyway. Group is workflow-only (not workflow+ref) so only one
## run per repo is in flight at any time across all branches/PRs.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  coverity:
    name: Coverity Scan
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch'
      || inputs.canonical-repos == ''
      || contains(format(',{0},', inputs.canonical-repos), format(',{0},', github.repository))

    timeout-minutes: ${{ inputs.timeout-minutes }}

    env:
      COVERITY_PROJECT: ${{ inputs.project-name != '' && inputs.project-name || (vars.COVERITY_PROJECT != '' && vars.COVERITY_PROJECT || github.event.repository.name) }}
      COVERITY_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}

    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout developer-meta-files (orchestration scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: org-ai-assisted/developer-meta-files
          ref: master
          path: __dmf
          persist-credentials: false

      - name: Sanity check secrets
        run: bash __dmf/ci/coverity-check-secrets.sh

      ## actions/cache runs as the unprivileged runner user; the
      ## default /var/cache/apt/archives is root-owned. Take
      ## ownership before restore/save so the cache action can
      ## read+write the directory without sudo. apt-get (run via
      ## sudo) can still write to a runner-owned directory because
      ## root can write anywhere.
      - name: Prepare apt cache directory
        if: inputs.apt-packages != ''
        run: |
          sudo mkdir -p /var/cache/apt/archives
          sudo chown -R "$(id -u):$(id -g)" /var/cache/apt/archives

      ## First-party actions/cache. Caches downloaded .deb archives.
          ## Key includes github.repository so different Coverity consumers
      ## (helper-scripts, kloak, ...) get distinct caches; key
      ## includes the reusable workflow file's hash so a change to
      ## the apt-install logic invalidates the cache.
      - name: Cache apt packages
        if: inputs.apt-packages != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-coverity-${{ github.repository }}-${{ hashFiles('.github/workflows/reusable-coverity.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-coverity-${{ github.repository }}-

      - name: Install build dependencies
        if: inputs.apt-packages != ''
        run: |
          sudo --non-interactive apt-get update --error-on=any
          sudo --non-interactive apt-get install --yes --no-install-recommends \
            ${{ inputs.apt-packages }}

      - name: Download Coverity Build Tool
        run: bash __dmf/ci/coverity-download.sh

      - name: Run Coverity build (Python default)
        if: inputs.build-command == ''
        run: bash __dmf/ci/coverity-build-python.sh

      - name: Run Coverity build (caller-supplied)
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Submit to Coverity Scan
        run: bash __dmf/ci/coverity-submit.sh

      - name: Upload cov-int artifact (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cov-int
          path: cov-int.tgz
          if-no-files-found: ignore
          retention-days: 7
