## AI-Assisted

## Reusable workflow: Coverity Scan static analysis.
##
## Replaces the third-party 'vapier/coverity-scan-action' approach
## with an inline curl + tar + cov-build flow shared across the org's
## consumers. No third-party Action's permissions footprint, no
## Marketplace dependency, single auditable script set in
## developer-meta-files/ci/.
##
## ## Trust footprint
##
## scan.coverity.com (Black Duck / Synopsys) - the cov-analysis
## tarball download is gated on a valid project token, md5-verified
## against the same endpoint, and optionally sha256-pinned via a
## .coverity-tool-sha256.expected file in the consumer repo root.
## See ci/coverity-download.sh for the verification logic.
##
## ## Secret isolation
##
## Strict 'workflow_call.secrets' schema below requires the caller
## to forward exactly COVERITY_SCAN_TOKEN and COVERITY_SCAN_EMAIL.
## Callers must use an explicit 'secrets:' map - 'secrets: inherit'
## bypasses the schema (it forwards every caller-side secret
## regardless). Run consumer-secrets-audit.yml manually to verify
## the secrets surface.
##
## Secrets are scoped to the individual steps that need them
## (Sanity check secrets / Download Coverity Build Tool / Submit
## to Coverity Scan) - NOT to job-level env: - so the pre-gate
## steps and any non-canonical run never see the token values.
## See agents/github-actions-consumer-templates.md
## "Coverity canonical-repos gate placement".
##
## ## Per-repo configuration: .github/dm-consumer.yml
##
## Per-repo values are read at workflow runtime from
## .github/dm-consumer.yml in the consumer repo. Schema:
##
##   coverity:
##     project-name:    "<scan.coverity.com project>"  # required
##     canonical-repos: "<owner>/<repo>[,<owner>/<repo>...]"  # required
##     apt-packages:    "<space-separated apt deps>"  # optional, default empty
##     build-command:   "<bash invocation>"           # optional, default empty
##
## Missing required keys hard-fail at workflow start. Missing
## optional keys treat as empty (no apt-install step, Python-only
## build via ci/coverity-build-python.sh).
##
## ## Caller responsibilities
##
## - Define the trigger schedule. Coverity Scan rate-limits
##   submissions (daily build limit), so weekly cron is the
##   typical choice. Schedule cannot live in workflow_call per
##   G-A-002.
## - Hardcode the owner in 'jobs.<id>.uses:' (G-A-001).
## - Forward via explicit 'secrets:' map (see Caller example). Not
##   'inherit'.
## - Author .github/dm-consumer.yml in the consumer repo with the
##   required keys.
##
## ## Secrets
##
## Forwarded explicitly by the caller (see Caller example):
##
## - COVERITY_SCAN_TOKEN  (required)  Coverity project token.
##                                    MUST be set as a repository
##                                    secret per consumer - tokens
##                                    are scoped per project on
##                                    scan.coverity.com, and our
##                                    consumers (helper-scripts,
##                                    kloak, security-misc) are
##                                    distinct Coverity projects
##                                    with distinct tokens. Cannot
##                                    be set org-wide.
## - COVERITY_SCAN_EMAIL  (required)  Notification email registered
##                                    on the Coverity project. CAN
##                                    be set org-wide if every
##                                    project shares one notification
##                                    address.
##
## ## Caller example - byte-identical consumer wrapper
##
##   name: Coverity
##   on:
##     push:
##       tags:
##         - '*'
##     schedule:
##       - cron: '0 6 * * 0'
##     workflow_dispatch:
##   permissions:
##     contents: read
##   concurrency:
##     group: ${{ github.workflow }}
##     cancel-in-progress: false
##   jobs:
##     coverity:
##       uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
##       secrets:
##         COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
##         COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
##       permissions:
##         contents: read
##
## Note: no 'with:' block on the reusable call. Per-repo values
## live in the consumer's .github/dm-consumer.yml, read at runtime.

name: Coverity Scan (reusable)

on:
  workflow_call:
    secrets:
      COVERITY_SCAN_TOKEN:
        required: true
      COVERITY_SCAN_EMAIL:
        required: true

permissions:
  contents: read

## No 'concurrency:' block - the caller's wrapper enforces the
## singleton (`group: ${{ github.workflow }}`, `cancel-in-progress:
## false`); declaring the same group here would cause Actions'
## deadlock detector to fire ("Canceling since a deadlock was
## detected for concurrency group: ..." between the top-level
## workflow and this reusable, because `github.workflow` inside a
## reusable resolves to the CALLER's workflow name). See
## agents/github-actions.md G-A-006 "Reusable-side concurrency".

jobs:
  coverity:
    name: Coverity Scan
    ## Pinned to ubuntu-24.04 so the apt-packaged yq (kislyuk's
    ## python-yq jq wrapper) remains stable across runner-image
    ## transitions; the config-load step's syntax depends on that
    ## implementation.
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout developer-meta-files (orchestration scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: org-ai-assisted/developer-meta-files
          ref: master
          path: .github/dmf
          persist-credentials: false

      - name: Install yq
        ## Ubuntu 24.04 ships kislyuk's python-yq jq wrapper. The
        ## `// ""` defaults and `-r` raw output in the next step
        ## are written for that implementation.
        run: |
          sudo --non-interactive apt-get update --error-on=any
          sudo --non-interactive apt-get install --yes --no-install-recommends yq

      - name: Load per-repo config from .github/dm-consumer.yml
        id: cfg
        ## yml keys are hyphenated; $GITHUB_OUTPUT names below are
        ## underscored, because GitHub Actions expression syntax
        ## parses `outputs.foo-bar` as subtraction, not as a
        ## hyphenated property reference.
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          cfg_file=".github/dm-consumer.yml"
          if [ ! -f "${cfg_file}" ]; then
            printf '%s\n' "error: ${cfg_file} not found; reusable-coverity requires per-repo config" >&2
            exit 1
          fi

          ## Required keys: missing or empty -> hard error.
          for key in project-name canonical-repos; do
            value="$(yq -r ".coverity[\"${key}\"]" "${cfg_file}")"
            if [ "${value}" = 'null' ] || [ -z "${value}" ]; then
              printf '%s\n' "error: ${cfg_file} missing coverity.${key}" >&2
              exit 1
            fi
            case "${value}" in
              *$'\n'*|*$'\r'*)
                printf '%s\n' "error: coverity.${key} contains newline; not allowed" >&2
                exit 1
                ;;
            esac
            out_name="${key//-/_}"
            printf '%s=%s\n' "${out_name}" "${value}" >> "${GITHUB_OUTPUT}"
          done

          ## Optional keys: missing -> empty string. Downstream
          ## steps interpret empty as "use the reusable's
          ## built-in default behavior" (no apt-install step,
          ## Python-only build).
          for key in apt-packages build-command; do
            value="$(yq -r ".coverity[\"${key}\"] // \"\"" "${cfg_file}")"
            case "${value}" in
              *$'\n'*|*$'\r'*)
                printf '%s\n' "error: coverity.${key} contains newline; not allowed" >&2
                exit 1
                ;;
            esac
            out_name="${key//-/_}"
            printf '%s=%s\n' "${out_name}" "${value}" >> "${GITHUB_OUTPUT}"
          done

      - name: Canonical-repos gate
        id: gate
        ## Step-level gate replaces the previous job-level if:
        ## block (which referenced inputs.canonical-repos, now a
        ## step output not visible to the job-level if:). Step
        ## outputs are visible to subsequent steps' if: clauses.
        ##
        ## Strict by design: workflow_dispatch no longer bypasses
        ## the canonical-repos check (the old reusable allowed
        ## that bypass). A fork-side manual dispatch would burn
        ## runner time for nothing - the org's COVERITY_SCAN_TOKEN
        ## is not available to forks - and the upstream's quota is
        ## now never at risk from cross-fork manual triggers.
        env:
          CANONICAL_REPOS: ${{ steps.cfg.outputs.canonical_repos }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          if printf ',%s,' "${CANONICAL_REPOS}" | grep -F -q ",${THIS_REPO},"; then
            printf '%s\n' "gate: ${THIS_REPO} is canonical (in '${CANONICAL_REPOS}'); allowing" >&2
            printf 'allowed=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' "gate: ${THIS_REPO} is not canonical (canonical list: '${CANONICAL_REPOS}'); skipping expensive steps" >&2
            printf 'allowed=false\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Sanity check secrets
        if: steps.gate.outputs.allowed == 'true'
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          COVERITY_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
          COVERITY_PROJECT: ${{ steps.cfg.outputs.project_name }}
        run: .github/dmf/ci/coverity-check-secrets.sh

      ## actions/cache runs as the unprivileged runner user; the
      ## default /var/cache/apt/archives is root-owned. Take
      ## ownership before restore/save so the cache action can
      ## read+write the directory without sudo. apt-get (run via
      ## sudo) can still write to a runner-owned directory because
      ## root can write anywhere.
      - name: Prepare apt cache directory
        if: steps.gate.outputs.allowed == 'true' && steps.cfg.outputs.apt_packages != ''
        run: |
          sudo mkdir -p /var/cache/apt/archives
          sudo chown -R "$(id -u):$(id -g)" /var/cache/apt/archives

      ## First-party actions/cache. Caches downloaded .deb archives.
      ## Key includes github.repository so different Coverity consumers
      ## (helper-scripts, kloak, ...) get distinct caches; key
      ## includes the reusable workflow file's hash so a change to
      ## the apt-install logic invalidates the cache.
      - name: Cache apt packages
        if: steps.gate.outputs.allowed == 'true' && steps.cfg.outputs.apt_packages != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-coverity-${{ github.repository }}-${{ hashFiles('.github/workflows/reusable-coverity.yml') }}

      - name: Install build dependencies
        if: steps.gate.outputs.allowed == 'true' && steps.cfg.outputs.apt_packages != ''
        env:
          APT_PACKAGES: ${{ steps.cfg.outputs.apt_packages }}
        run: |
          sudo --non-interactive apt-get update --error-on=any
          # shellcheck disable=SC2086
          sudo --non-interactive apt-get install --yes --no-install-recommends \
            ${APT_PACKAGES}

      - name: Download Coverity Build Tool
        if: steps.gate.outputs.allowed == 'true'
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          COVERITY_PROJECT: ${{ steps.cfg.outputs.project_name }}
        run: .github/dmf/ci/coverity-download.sh

      - name: Run Coverity build (Python default)
        if: steps.gate.outputs.allowed == 'true' && steps.cfg.outputs.build_command == ''
        run: .github/dmf/ci/coverity-build-python.sh

      - name: Run Coverity build (caller-supplied)
        if: steps.gate.outputs.allowed == 'true' && steps.cfg.outputs.build_command != ''
        env:
          BUILD_COMMAND: ${{ steps.cfg.outputs.build_command }}
        run: bash -c "${BUILD_COMMAND}"

      ## coverity-submit.sh always packs cov-int.tgz. DRY_RUN is
      ## hardcoded to false in this refactor: per the spec, dry-run
      ## is not a wrapper-overridable input. Manual dry-runs can
      ## be done in a development branch by editing the wrapper
      ## temporarily.
      - name: Submit to Coverity Scan
        if: steps.gate.outputs.allowed == 'true'
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          COVERITY_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
          COVERITY_PROJECT: ${{ steps.cfg.outputs.project_name }}
          DRY_RUN: 'false'
        run: .github/dmf/ci/coverity-submit.sh

      - name: Upload cov-int artifact (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cov-int
          path: cov-int.tgz
          if-no-files-found: ignore
          retention-days: 7
